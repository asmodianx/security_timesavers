<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Live Dashboard</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111827;
            --card-bg: #ffffff;
            --accent-color: #2563eb;
            --border-color: #e5e7eb;
            --highlight-bg: #fffbeb;
            --now-line: #ef4444;
            --sidebar-width: 340px;
            --gutter-width: 85px;
            --px-per-min: 5.0; 
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --border-color: #334155;
            --highlight-bg: #1e1b4b;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh; overflow: hidden;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr var(--sidebar-width);
            height: 100vh;
        }

        /* --- TIMELINE COLUMN --- */
        .viewport {
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .day-section { position: relative; margin-bottom: 150px; }

        .day-sticky-header {
            position: sticky; top: 0;
            background: var(--bg-color);
            padding: 20px 40px;
            font-size: 2rem; font-weight: 800;
            z-index: 100;
            border-bottom: 3px solid var(--accent-color);
        }

        .timeline-grid { display: flex; position: relative; min-height: 7200px; }

        .time-gutter {
            width: var(--gutter-width); flex-shrink: 0;
            border-right: 1px solid var(--border-color);
            background: var(--bg-color);
        }

        .hour-mark {
            position: absolute; right: 10px;
            font-size: 0.75rem; font-weight: bold;
            color: var(--accent-color); transform: translateY(-50%);
        }

        .event-stage { flex-grow: 1; position: relative; margin-right: 15px; }

        /* --- EVENT NODES --- */
        .event-node {
            position: absolute;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 6px solid var(--cat-color);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
            transition: all 0.2s ease;
            min-height: 70px; /* Prevents text crowding */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .event-node:hover {
            z-index: 500;
            transform: scale(1.01);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: visible; 
            height: auto !important; 
        }

        .event-node.active {
            background: var(--highlight-bg);
            border-color: var(--now-line);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .event-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 2px; line-height: 1.2; }
        .event-loc { font-size: 0.8rem; font-weight: 700; opacity: 0.7; color: var(--accent-color); }
        .event-desc { font-size: 0.85rem; margin-top: 6px; opacity: 0.9; line-height: 1.4; }

        #now-line {
            position: absolute; left: 0; right: 0;
            height: 3px; background: var(--now-line);
            z-index: 200; pointer-events: none; display: none;
        }

        /* --- SIDEBAR --- */
        .sidebar { padding: 30px; background: var(--card-bg); display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }
        
        /* Fixed Logo Container Styling */
        .logo-container {
            width: 100%; height: 180px;
            border: 2px dashed var(--border-color); 
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; overflow: hidden; background: #fafafa;
        }
        .logo-container.active {
            border: none;
            background: transparent;
        }
        #logo-display { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }

        #live-clock { font-size: 3.5rem; font-weight: 900; color: var(--accent-color); margin-top: auto; letter-spacing: -2px; }
        #live-date { font-size: 1.1rem; opacity: 0.6; margin-bottom: 20px; font-weight: 500; }

        /* --- ADMIN --- */
        .admin-wrap { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .admin-panel {
            display: none; position: fixed; top: 80px; right: 20px;
            width: 320px; background: var(--card-bg); padding: 20px;
            border-radius: 15px; border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .admin-panel.open { display: block; }
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); box-sizing: border-box; }
        .btn-add { background: var(--accent-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body data-theme="light">

    <div class="admin-wrap">
        <button onclick="document.getElementById('panel').classList.toggle('open')" style="width:50px; height:50px; border-radius:25px; background:var(--accent-color); color:white; border:none; cursor:pointer; font-size:1.5rem;">⚙️</button>
        <div class="admin-panel" id="panel">
            <h3 style="margin:0 0 15px 0">Management</h3>
            <input type="date" id="inDate">
            <div style="display:flex; gap:10px;">
                <input type="time" id="inStart">
                <input type="time" id="inEnd">
            </div>
            <input type="text" id="inName" placeholder="Event Name">
            <input type="text" id="inLoc" placeholder="Location">
            <select id="inCat">
                <option value="talk">Talk</option>
                <option value="workshop">Workshop</option>
                <option value="village">Village</option>
                <option value="social">Social</option>
            </select>
            <textarea id="inDesc" placeholder="Description" rows="2"></textarea>
            <button class="btn-add" onclick="addEvent()">Add Event</button>
            <hr style="margin:15px 0; border:0; border-top:1px solid var(--border-color);">
            <button onclick="toggleTheme()" style="width:100%; padding:8px; margin-bottom:5px;">🌓 Toggle Theme</button>
            <button onclick="exportData()" style="width:100%; padding:8px; margin-bottom:5px;">💾 Export JSON</button>
            <button onclick="document.getElementById('importFile').click()" style="width:100%; padding:8px;">📂 Import JSON</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div class="main-layout">
        <main class="viewport" id="scrollBox">
            <div id="timeline-root"></div>
        </main>

        <aside class="sidebar">
            <div class="logo-container" id="logo-frame">
                <img id="logo-display" src="" alt="Logo">
            </div>
            <input type="file" accept="image/*" onchange="loadLogo(event)" style="font-size: 0.7rem; margin-bottom: 20px;">
            
            <h1 id="conf-name" contenteditable="true" onfocus="hideHint()" style="margin:0; font-size:2.2rem; line-height:1.1;">Conference Name</h1>
            <p id="edit-hint" style="font-size: 0.8rem; opacity: 0.5; margin-top:5px;">(Click to edit title)</p>

            <div id="live-clock">00:00:00</div>
            <div id="live-date">...</div>
        </aside>
    </div>

    <script>
        let events = [];
        const pxMin = 5.0; 
        const colors = { talk: "#3b82f6", workshop: "#10b981", village: "#f59e0b", social: "#8b5cf6" };

        function hideHint() {
            document.getElementById('edit-hint').style.visibility = 'hidden';
        }

        function timeToMin(t) {
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + m;
        }

        // --- STACKING LOGIC ---
        function processDayLayout(dayEvents) {
            dayEvents.sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin);
            let clusters = [];
            dayEvents.forEach(ev => {
                let lastCluster = clusters[clusters.length - 1];
                if (!lastCluster || ev.startMin >= Math.max(...lastCluster.map(e => e.endMin))) {
                    clusters.push([ev]);
                } else {
                    lastCluster.push(ev);
                }
            });

            clusters.forEach(cluster => {
                let columns = [];
                cluster.forEach(ev => {
                    let colIdx = columns.findIndex(col => col[col.length-1].endMin <= ev.startMin);
                    if (colIdx === -1) {
                        ev.col = columns.length;
                        columns.push([ev]);
                    } else {
                        ev.col = colIdx;
                        columns[colIdx].push(ev);
                    }
                });
                let maxCols = columns.length;
                cluster.forEach(ev => {
                    ev.width = 100 / maxCols;
                    ev.left = ev.col * ev.width;
                });
            });
        }

        function addEvent() {
            const start = document.getElementById('inStart').value;
            const end = document.getElementById('inEnd').value;
            const date = document.getElementById('inDate').value;
            if (!start || !end || !date) return alert("Please fill date and times!");

            events.push({
                id: Date.now(), date, start, end,
                startMin: timeToMin(start),
                endMin: timeToMin(end),
                name: document.getElementById('inName').value || "New Event",
                loc: document.getElementById('inLoc').value || "Location",
                cat: document.getElementById('inCat').value,
                desc: document.getElementById('inDesc').value
            });
            render();
            document.getElementById('panel').classList.remove('open');
        }

        function render() {
            const root = document.getElementById('timeline-root');
            root.innerHTML = '';

            const grouped = events.reduce((acc, ev) => {
                acc[ev.date] = acc[ev.date] || [];
                acc[ev.date].push(ev);
                return acc;
            }, {});

            Object.keys(grouped).sort().forEach(date => {
                const dayEvents = grouped[date];
                processDayLayout(dayEvents);

                const section = document.createElement('div');
                section.className = 'day-section';
                section.dataset.date = date; 
                
                let hourMarks = '';
                for(let i=0; i<24; i++) {
                    hourMarks += `<div class="hour-mark" style="top:${i*60*pxMin}px">${i.toString().padStart(2,'0')}:00</div>`;
                }

                const dDisplay = new Date(date + 'T00:00:00').toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});

                section.innerHTML = `
                    <div class="day-sticky-header">${dDisplay}</div>
                    <div class="timeline-grid">
                        <div class="time-gutter">${hourMarks}</div>
                        <div class="event-stage">
                            <div id="now-line"></div>
                            ${dayEvents.map(ev => `
                                <div class="event-node" 
                                     style="top:${ev.startMin*pxMin}px; 
                                            height:${(ev.endMin-ev.startMin)*pxMin}px; 
                                            left:${ev.left}%; 
                                            width:${ev.width-1}%; 
                                            --cat-color:${colors[ev.cat]}"
                                     data-id="${ev.id}"
                                     oncontextmenu="event.preventDefault(); deleteEvent(${ev.id})">
                                    <div class="event-name">${ev.name}</div>
                                    <div class="event-loc">📍 ${ev.loc} (${ev.start}-${ev.end})</div>
                                    <div class="event-desc">${ev.desc}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                root.appendChild(section);
            });
            updateClock();
        }

        function deleteEvent(id) {
            if(confirm("Delete this event?")) { events = events.filter(e => e.id !== id); render(); }
        }

        function updateClock() {
            const now = new Date();
            const today = now.toLocaleDateString('en-CA'); 
            const curMin = (now.getHours() * 60) + now.getMinutes();

            document.getElementById('live-clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
            document.getElementById('live-date').textContent = now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});

            document.querySelectorAll('.day-section').forEach(sec => {
                const line = sec.querySelector('#now-line');
                if (sec.dataset.date === today) {
                    line.style.display = 'block';
                    line.style.top = (curMin * pxMin) + 'px';
                } else {
                    line.style.display = 'none';
                }
            });

            events.forEach(ev => {
                const node = document.querySelector(`[data-id="${ev.id}"]`);
                if (node) {
                    if (ev.date === today && curMin >= ev.startMin && curMin <= ev.endMin) {
                        node.classList.add('active');
                    } else {
                        node.classList.remove('active');
                    }
                }
            });
        }

        function loadLogo(e) {
            const file = e.target.files;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const display = document.getElementById('logo-display');
                const frame = document.getElementById('logo-frame');
                display.src = event.target.result;
                display.style.display = 'block';
                frame.classList.add('active');
            };
            reader.readAsDataURL(file[0]);
        }

        function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }
        
        function exportData() {
            const data = { 
                name: document.getElementById('conf-name').textContent, 
                logo: document.getElementById('logo-display').src,
                events 
            };
            const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='schedule.json'; a.click();
        }

        function importData(e) {
            const r = new FileReader();
            r.onload = (ev) => { 
                const d = JSON.parse(ev.target.result);
                events = d.events || [];
                if(d.name) {
                    document.getElementById('conf-name').textContent = d.name;
                    hideHint();
                }
                if(d.logo && d.logo.length > 50) {
                    const display = document.getElementById('logo-display');
                    const frame = document.getElementById('logo-frame');
                    display.src = d.logo;
                    display.style.display = 'block';
                    frame.classList.add('active');
                }
                render(); 
            };
            r.readAsText(e.target.files[0]);
        }

        setInterval(updateClock, 1000);
        render(); 
    </script>
</body>
</html>
