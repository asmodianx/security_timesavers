:root{--bg:#f6f8fb;--panel:#fff;--ink:#172033;--muted:#5d6a80;--line:#d8e1ef;--blue:#2457d6;--blue2:#173e9f;--green:#137333;--red:#b3261e;--amber:#8a5a00;--shadow:0 12px 30px rgba(23,32,51,.10);--radius:16px;--sans:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.45}.appHeader{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#102a6b,#2457d6);color:#fff;padding:16px 22px;box-shadow:var(--shadow)}.appHeader h1{margin:0;font-size:1.25rem}.appHeader p{margin:.25rem 0 0;color:#dbe6ff;font-size:.9rem}main{display:grid;grid-template-columns:330px minmax(0,1fr);gap:16px;max-width:1800px;margin:0 auto;padding:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.sidebar{position:sticky;top:82px;height:calc(100vh - 98px);overflow:auto;padding:14px}.step{display:flex;gap:10px;align-items:center;width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:14px;margin:7px 0;padding:10px;text-align:left;cursor:pointer}.step.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(36,87,214,.16);background:#f8fbff}.step.done .num{background:var(--green)}.num{display:inline-grid;place-items:center;min-width:24px;height:24px;border-radius:999px;background:#98a5ba;color:white;font-weight:800;font-size:.78rem}.step strong{display:block}.step small{display:block;color:var(--muted);font-size:.76rem}.sideHelp{font-size:.83rem;color:var(--muted)}.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:12px;margin-bottom:14px}button,.btn{border:0;background:var(--blue);color:white;border-radius:12px;padding:9px 12px;font-weight:750;cursor:pointer}button.secondary{background:#eef3ff;color:var(--blue2);border:1px solid #cdd9ff}button.warn{background:#fff4e0;color:var(--amber);border:1px solid #ffd58a}button.danger{background:#fdebea;color:var(--red);border:1px solid #f2b8b5}button:focus,input:focus,textarea:focus,select:focus{outline:3px solid rgba(36,87,214,.25);outline-offset:1px}.workspace{min-width:0}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(430px,.9fr);gap:14px}.panel{display:none;padding:16px}.panel.active{display:block}.panel h2{margin:.1rem 0 .25rem}.lead{color:var(--muted);margin:.25rem 0 1rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}.field{display:flex;flex-direction:column;gap:5px}.field label{font-weight:800}.hint{font-size:.8rem;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:white;color:var(--ink);font:inherit}textarea{min-height:96px;resize:vertical}.short{min-height:52px}.medium{min-height:120px}.contentField{min-height:260px;border:1px solid var(--line);background:#fff}.callout{background:#f8fbff;border:1px dashed #b8c8ef;border-radius:14px;padding:10px;margin:8px 0}.callout strong{color:var(--blue2)}.typeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.typeCard{border:1px solid var(--line);background:white;color:var(--ink);border-radius:16px;padding:12px;text-align:left;min-height:150px}.typeCard.active{border-color:var(--blue);background:#f5f8ff;box-shadow:0 0 0 3px rgba(36,87,214,.12)}.typeCard h3{margin:.1rem 0 .3rem}.typeCard p{margin:.2rem 0;color:var(--muted);font-size:.86rem}.sectionCard{border:1px solid var(--line);background:#fbfcff;border-radius:16px;padding:12px;margin:12px 0}.sectionTop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.sectionTop h3{margin:.1rem 0}.sectionTools{display:flex;gap:5px;flex-wrap:wrap}.sectionTools button{background:white;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:5px 8px}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;background:#f7f9fc;color:var(--muted);font-size:.78rem;margin:2px}.pill.primary{background:#eef3ff;color:var(--blue2);border-color:#cdd9ff}table{width:100%;border-collapse:collapse;margin:8px 0}th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{background:#f2f5fb}.rowActions button{background:white;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:5px 8px}.status{display:none;margin:10px 0;padding:10px 12px;border-radius:12px;background:#eef8f1;color:#105d2c;border:1px solid #b7e1c4}.status.show{display:block}.hidden{display:none!important}.quality li.pass{color:var(--green)}.quality li.warn{color:var(--amber)}.quality li.fail{color:var(--red)}.preview{padding:22px;max-height:calc(100vh - 142px);overflow:auto}.preview h1,.preview h2,.preview h3{line-height:1.2}.preview .draft{display:inline-block;color:var(--red);border:2px solid var(--red);font-weight:900;padding:4px 8px;transform:rotate(-3deg)}.preview .note{border-left:4px solid var(--blue);background:#f6f9ff;padding:8px 10px;margin:8px 0}.preview .empty{color:var(--muted);font-style:italic}@media(max-width:1140px){main{grid-template-columns:1fr}.sidebar{position:static;height:auto}.split{grid-template-columns:1fr}.preview{max-height:none}.grid,.typeGrid{grid-template-columns:1fr}}@media print{.appHeader,.sidebar,.toolbar,.editorOnly{display:none!important}main{display:block;padding:0;max-width:none}.card{box-shadow:none;border:0;border-radius:0}.preview{max-height:none;padding:0}body{background:white}.preview a{color:#000;text-decoration:none}}
</style></head><body><header class="appHeader"><h1>NIST Documentation Wizard v7</h1><p>Wizard-based document builder with editable content fields for every section.</p></header><main><aside class="sidebar card editorOnly"><div id="steps"></div><div id="status" class="status"></div><hr><p class="sideHelp">Use <strong>Step 5: Sections</strong> to enter the body text for each document section. Examples are shown as static guidance from the template, not editable fields.</p></aside><section class="workspace"><div class="toolbar card editorOnly"><button onclick="newDoc()">New</button><button class="secondary" onclick="saveLocal()">Save Local</button><button class="secondary" onclick="go('review')">Load</button><button class="secondary" onclick="exportMarkdown()">Export Markdown</button><button class="secondary" onclick="exportJson()">Export JSON</button><button class="secondary" onclick="document.getElementById('importFile').click()">Import JSON</button><button class="secondary" onclick="window.print()">Print / Save as PDF</button><button class="warn" onclick="snapshot()">Add Revision Snapshot</button><button class="danger" onclick="clearLocal()">Clear Local Data</button><input id="importFile" class="hidden" type="file" accept="application/json,.json" onchange="importJson(event)"></div><div class="split"><div id="panels" class="card editorOnly"></div><article id="preview" class="card preview"></article></div></section></main><script>

const STORE='nist_doc_wizard_v7'; const today=()=>new Date().toISOString().slice(0,10); const now=()=>new Date().toISOString(); const uid=()=> 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); const nl2br=s=>esc(s).replace(/\n/g,'<br>'); const slug=s=>String(s||'document').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,85)||'document'; const download=(name,type,text)=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},0)};
const nistFunctions=['Govern (GV)','Identify (ID)','Protect (PR)','Detect (DE)','Respond (RS)','Recover (RC)']; const nistFamilies=['AC - Access Control','AT - Awareness and Training','AU - Audit and Accountability','CA - Assessment, Authorization, and Monitoring','CM - Configuration Management','CP - Contingency Planning','IA - Identification and Authentication','IR - Incident Response','PL - Planning','PM - Program Management','RA - Risk Assessment','SA - System and Services Acquisition','SC - System and Communications Protection','SI - System and Information Integrity','SR - Supply Chain Risk Management'];
const typeDefs={Policy:{desc:'Management intent and mandatory governance direction.',sections:[['Purpose','Explain why the policy exists, the risk it addresses, and the NIST outcome it supports.','This policy establishes management direction for protecting institutional systems and data.'],['Authority and Ownership','Identify approval authority, document owner, steward, review cadence, and exception authority.','The security governance authority owns this policy; exceptions require documented risk acceptance.'],['Scope and Applicability','Define covered people, systems, data, services, third parties, and exclusions.','Applies to workforce members, affiliates, contractors, managed endpoints, cloud services, and institutional data.'],['Policy Statements','Write mandatory requirements using must/shall language. Do not merely restate NIST controls.','Access must be authorized, uniquely attributable, periodically reviewed, and removed when no longer needed.'],['NIST Alignment and Control Intent','Map the policy to NIST CSF outcomes and SP 800-53 control families or controls.','Supports Govern and Protect outcomes and aligns to PM, AC, IA, AU, and RA families.'],['Roles and Responsibilities','Define responsibilities by role.','System owners implement requirements, retain evidence, and coordinate remediation.'],['Compliance Monitoring and Enforcement','Describe assessment, evidence, violations, escalation, and corrective action.','Compliance may be assessed through audit, testing, vulnerability data, access reviews, or ticket evidence.'],['Exceptions and Risk Acceptance','Define time-bound exception requirements, compensating controls, approval, and expiration.','Exceptions must include justification, risk, compensating controls, owner, approval, and review date.'],['Review and Maintenance','Define review cadence and update triggers.','Review annually or after audit findings, incidents, major technology changes, regulatory changes, or NIST updates.']]},Procedure:{desc:'Step-by-step workflow with expected results and evidence.',sections:[['Purpose','Describe the operational outcome this procedure achieves.','This procedure describes how analysts validate, contain, document, and escalate endpoint security alerts.'],['Prerequisites','List access, tools, inputs, approvals, assumptions, and evidence locations.','Analyst has EDR access, ticket number, authorized scope, and approved communications channel.'],['NIST / RMF Context','Describe the NIST outcome, control family, or RMF activity supported.','Supports Detect and Respond outcomes and produces evidence for IR and AU control families.'],['Procedure Steps','Write numbered steps with expected result and evidence to capture.','1. Open the alert. Expected result: alert details are visible. Evidence: case note or exported timeline.'],['Decision Points and Escalation','Document branching logic, severity criteria, approvals, and handoffs.','Escalate if credential theft, lateral movement, persistence, or regulated data exposure is suspected.'],['Validation and Quality Checks','Define completion checks and peer review requirements.','Confirm containment, affected identities, impacted assets, and final ticket notes are complete.'],['Rollback / Recovery','Describe safe rollback or recovery if the procedure cannot be completed.','Revert to the last approved baseline and notify affected stakeholders.'],['Records, Evidence, and Retention','Define artifacts, naming convention, storage location, and retention expectations.','Store exported logs, screenshots, approvals, and analyst notes in the incident or change record.']]},Standard:{desc:'Measurable mandatory baseline and verification method.',sections:[['Purpose','State the mandatory baseline and the risk it reduces.','This standard defines minimum secure configuration requirements for managed servers.'],['Scope','Define covered platforms, services, environments, data types, and exclusions.','Applies to production Linux servers connected to institutional networks.'],['NIST Baseline and Control Mapping','Map requirements to NIST CSF outcomes and SP 800-53 controls/families.','Aligns to Protect platform security outcomes and CM, AC, IA, AU, and SI families.'],['Normative Requirements','List measurable shall/must requirements with acceptance criteria.','Internet-facing SSH services must disable password authentication and root login.'],['Configuration / Implementation Baseline','List approved settings, values, versions, or implementation patterns.','PermitRootLogin no; PasswordAuthentication no; evidence includes effective runtime configuration.'],['Assessment and Verification','Define testing method, evidence, frequency, and owner.','Configuration scans run weekly; exceptions and failed checks are reviewed monthly.'],['Exceptions and Compensating Controls','Define exception requirements, risk acceptance, compensating controls, owner, and expiration.','Legacy exception expires in 90 days and requires additional monitoring and restricted access.']]},'Best Practice':{desc:'Recommended guidance, examples, anti-patterns, and checklist.',sections:[['Purpose','Explain the recommended practice and the NIST outcome it supports.','This best practice helps teams reduce exposure from unmanaged credentials and secrets.'],['Audience','Describe who should use this guidance and when.','Developers, system administrators, service owners, analysts, and project teams.'],['NIST Alignment','Map the practice to NIST CSF outcomes and relevant SP 800-53 families.','Supports Govern and Protect outcomes and may align to AC, IA, CM, SI, and SR families.'],['Recommended Practices','List actionable recommendations with rationale.','Teams should store secrets in an approved vault and rotate them after suspected exposure.'],['Implementation Examples','Provide examples, commands, checklists, patterns, or decision aids.','For new services, document owner, data classification, logging, recovery, and access model.'],['Anti-Patterns','Describe common mistakes to avoid.','Do not share service account passwords in chat, tickets, or documentation.'],['Validation Checklist','Provide a self-assessment checklist.','Owner assigned; risks documented; access reviewed; logging enabled; recovery tested.']]}};
const steps=[['type','Document Type','type and format notes'],['meta','Metadata','title, owner, version, summary'],['nist','NIST Alignment','framework fields'],['scope','Scope & Definitions','scope and term fields'],['sections','Sections','section body fields'],['controls','Controls & Exceptions','editable tables'],['refs','References & Notes','reference and note fields'],['review','Review & Export','review notes and exports']];
let active='sections'; let doc=newDocObj('Policy'); function makeSection(a){return{id:uid(),title:a[0],instruction:a[1],example:a[2],content:'',notes:[],references:[]}} function newDocObj(type){return{schema:'nist-doc-wizard-v7',id:uid(),type,typeSelectionNotes:'',title:'New '+type+' Document',status:'Draft',classification:'Internal',version:'0.1',effectiveDate:'',nextReviewDate:'',owner:'',approver:'',steward:'',department:'',summary:'',purpose:'',background:'',scope:'',audience:'',outOfScope:'',assumptions:'',definitions:[{term:'',definition:''}],nist:{profile:'NIST CSF 2.0 + NIST SP 800-53 Rev. 5',functions:['Govern (GV)'],families:['PM - Program Management'],rmfStep:'Prepare',outcomes:'',riskStatement:'',evidenceStrategy:'',assessmentMethod:'Examine, Interview, Test as applicable'},sections:typeDefs[type].sections.map(makeSection),controls:[{id:'NIST-001',csf:'GV.PO / PR.AA',control:'PM / AC / IA',requirement:'',evidence:'',frequency:'',owner:''}],exceptions:[{id:'EX-001',description:'',risk:'',compensatingControl:'',owner:'',expiration:''}],references:[{id:'REF-001',title:'NIST Cybersecurity Framework 2.0',source:'https://www.nist.gov/cyberframework',note:'Cybersecurity outcomes and profiles.'},{id:'REF-002',title:'NIST SP 800-53 Rev. 5',source:'https://doi.org/10.6028/NIST.SP.800-53r5',note:'Security and privacy control catalog.'},{id:'REF-003',title:'NIST SP 800-37 Rev. 2 RMF',source:'https://doi.org/10.6028/NIST.SP.800-37r2',note:'Risk Management Framework context.'}],notes:[{id:'NOTE-001',section:'General',text:'Tailor this document to local authority, risk appetite, operational practice, and legal/regulatory obligations.'}],reviewNotes:'',revisions:[{version:'0.1',date:today(),author:'',summary:'Initial draft created.',approver:'',status:'Draft'}],snapshots:[],created:now(),modified:now()}}
function go(id){active=id;render()} function touch(){doc.modified=now();renderPreview();renderSteps()} function setStatus(m){const e=document.getElementById('status');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),4500)} function render(){renderSteps();renderPanels();renderPreview()} function renderSteps(){document.getElementById('steps').innerHTML=steps.map(([id,label,sub],i)=>`<button class="step ${active===id?'active':''} ${done(id)?'done':''}" onclick="go('${id}')"><span class="num">${i+1}</span><span><strong>${esc(label)}</strong><small>${esc(sub)}</small></span></button>`).join('')} function done(id){if(id==='type')return !!doc.type;if(id==='meta')return !!doc.title&&!!doc.owner;if(id==='nist')return doc.nist.functions.length&&doc.nist.families.length&&!!doc.nist.outcomes;if(id==='scope')return !!doc.scope;if(id==='sections')return doc.sections.some(s=>s.content.trim());if(id==='controls')return doc.controls.some(c=>c.requirement||c.evidence);if(id==='refs')return doc.references.length>0;return true} function renderPanels(){document.getElementById('panels').innerHTML=steps.map(([id])=>`<section class="panel ${active===id?'active':''}" data-step="${id}">${panel(id)}</section>`).join('')} function val(k){return `value="${esc(doc[k])}" oninput="doc['${k}']=this.value;touch()"`}
function panel(id){if(id==='type')return `<h2>1. Document Type</h2><p class="lead">Choose a document type and enter any format notes.</p><div class="typeGrid">${Object.entries(typeDefs).map(([t,d])=>`<button class="typeCard ${doc.type===t?'active':''}" onclick="changeType('${t}')"><h3>${esc(t)}</h3><p>${esc(d.desc)}</p><p class="hint">${d.sections.length} starter sections</p></button>`).join('')}</div><div class="field full"><label>Format Notes</label><textarea class="medium" placeholder="Notes about structure, audience, special sections, or review expectations..." oninput="doc.typeSelectionNotes=this.value;touch()">${esc(doc.typeSelectionNotes)}</textarea></div>`; if(id==='meta')return `<h2>2. Metadata</h2><div class="grid"><div class="field"><label>Document Title</label><input ${val('title')}></div><div class="field"><label>Status</label><select onchange="doc.status=this.value;touch()">${['Draft','In Review','Approved','Published','Retired'].map(x=>`<option ${doc.status===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Classification</label><select onchange="doc.classification=this.value;touch()">${['Public','Internal','Confidential','Restricted'].map(x=>`<option ${doc.classification===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Version</label><input ${val('version')}></div><div class="field"><label>Effective Date</label><input type="date" ${val('effectiveDate')}></div><div class="field"><label>Next Review Date</label><input type="date" ${val('nextReviewDate')}></div><div class="field"><label>Department / Unit</label><input ${val('department')}></div><div class="field"><label>Owner</label><input ${val('owner')}></div><div class="field"><label>Approver</label><input ${val('approver')}></div><div class="field"><label>Steward / Maintainer</label><input ${val('steward')}></div><div class="field full"><label>Executive Summary</label><textarea class="medium" oninput="doc.summary=this.value;touch()">${esc(doc.summary)}</textarea></div><div class="field full"><label>Purpose</label><textarea class="medium" oninput="doc.purpose=this.value;touch()">${esc(doc.purpose)}</textarea></div><div class="field full"><label>Background / Rationale</label><textarea class="medium" oninput="doc.background=this.value;touch()">${esc(doc.background)}</textarea></div></div><h3>Revision History</h3>${table('revisions',['version','date','author','summary','approver','status'],['Version','Date','Author','Summary of Change','Approver','Status'])}`; if(id==='nist')return `<h2>3. NIST Alignment</h2><div class="grid"><div class="field full"><label>NIST Profile</label><select onchange="doc.nist.profile=this.value;touch()">${['NIST CSF 2.0 + NIST SP 800-53 Rev. 5','NIST CSF 2.0','NIST SP 800-53 Rev. 5','NIST SP 800-37 Rev. 2 RMF','NIST SP 800-171 / CUI-oriented','Custom NIST-aligned profile'].map(x=>`<option ${doc.nist.profile===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>NIST CSF 2.0 Functions</label><select multiple size="6" onchange="multi('functions',this)">${nistFunctions.map(x=>`<option ${doc.nist.functions.includes(x)?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>NIST SP 800-53 Families</label><select multiple size="10" onchange="multi('families',this)">${nistFamilies.map(x=>`<option ${doc.nist.families.includes(x)?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>RMF Step / Context</label><select onchange="doc.nist.rmfStep=this.value;touch()">${['Prepare','Categorize','Select','Implement','Assess','Authorize','Monitor','Not Applicable'].map(x=>`<option ${doc.nist.rmfStep===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Assessment Method</label><input value="${esc(doc.nist.assessmentMethod)}" oninput="doc.nist.assessmentMethod=this.value;touch()"></div><div class="field full"><label>NIST Outcomes / Control Objective</label><textarea class="medium" oninput="doc.nist.outcomes=this.value;touch()">${esc(doc.nist.outcomes)}</textarea></div><div class="field full"><label>Risk Statement</label><textarea class="medium" oninput="doc.nist.riskStatement=this.value;touch()">${esc(doc.nist.riskStatement)}</textarea></div><div class="field full"><label>Evidence Strategy</label><textarea class="medium" oninput="doc.nist.evidenceStrategy=this.value;touch()">${esc(doc.nist.evidenceStrategy)}</textarea></div></div>`; if(id==='scope')return `<h2>4. Scope & Definitions</h2><div class="grid"><div class="field full"><label>In Scope</label><textarea class="medium" oninput="doc.scope=this.value;touch()">${esc(doc.scope)}</textarea></div><div class="field"><label>Audience</label><textarea class="medium" oninput="doc.audience=this.value;touch()">${esc(doc.audience)}</textarea></div><div class="field"><label>Out of Scope</label><textarea class="medium" oninput="doc.outOfScope=this.value;touch()">${esc(doc.outOfScope)}</textarea></div><div class="field full"><label>Assumptions / Dependencies</label><textarea class="medium" oninput="doc.assumptions=this.value;touch()">${esc(doc.assumptions)}</textarea></div></div><h3>Definitions</h3>${table('definitions',['term','definition'],['Term','Definition'])}`; if(id==='sections')return `<h2>5. Sections</h2><p class="lead">Enter the body text for each section in the <strong>Content</strong> field. You can add, duplicate, delete, rename, and reorder sections.</p><p><button class="secondary" onclick="addSection()">Add Blank Section</button> <button class="secondary" onclick="addTemplateSection()">Add Section From Template</button> <button class="warn" onclick="resetSections()">Reset to ${esc(doc.type)} Template</button></p>${doc.sections.map(sectionEditor).join('')}`; if(id==='controls')return `<h2>6. Controls & Exceptions</h2><h3>NIST Control Mapping</h3>${table('controls',['id','csf','control','requirement','evidence','frequency','owner'],['ID','NIST CSF Outcome','SP 800-53 Control / Family','Requirement','Evidence','Frequency','Owner'])}<h3>Exceptions / Risk Acceptance</h3>${table('exceptions',['id','description','risk','compensatingControl','owner','expiration'],['ID','Description','Risk','Compensating Control','Owner','Expiration'])}`; if(id==='refs')return `<h2>7. References & Notes</h2><h3>References</h3>${table('references',['id','title','source','note'],['ID','Title','Source / Link','Note'])}<h3>Sub Notes</h3>${table('notes',['id','section','text'],['ID','Section','Note'])}<h3>Generated Keyword Index</h3><div class="callout">${keywordIndex().map(k=>`<span class="pill">${esc(k)}</span>`).join(' ')||'<span class="hint">Add content to generate index terms.</span>'}</div>`; if(id==='review')return `<h2>8. Review & Export</h2><div class="field full"><label>Review / Publication Notes</label><textarea class="medium" placeholder="Review notes, publication instructions, approval notes, or export reminders..." oninput="doc.reviewNotes=this.value;touch()">${esc(doc.reviewNotes)}</textarea></div><h3>Quality Checklist</h3><ul class="quality">${quality().map(q=>`<li class="${q.state}">${esc(q.text)}</li>`).join('')}</ul><h3>Saved Local Documents</h3>${savedList()}<h3>Revision Snapshots</h3>${snapshotsHtml()}<div class="callout"><strong>Exports:</strong> JSON is editable project state. Markdown is final text output. PDF uses browser Print / Save as PDF.</div>`;}
function multi(k,sel){doc.nist[k]=Array.from(sel.selectedOptions).map(o=>o.value);touch()} function sectionEditor(s,i){return `<div class="sectionCard"><div class="sectionTop"><div><h3>${i+1}. ${esc(s.title)}</h3><span class="pill primary">${esc(doc.type)} section</span></div><div class="sectionTools"><button onclick="moveSection(${i},-1)">↑</button><button onclick="moveSection(${i},1)">↓</button><button onclick="dupSection(${i})">Duplicate</button><button onclick="deleteSection(${i})">Delete</button></div></div><div class="callout"><strong>Instruction:</strong> ${esc(s.instruction)}<br><strong>Example:</strong> ${esc(s.example)}</div><div class="grid"><div class="field"><label>Section Title</label><input value="${esc(s.title)}" oninput="doc.sections[${i}].title=this.value;touch()"></div><div class="field"><label>Instruction</label><textarea class="short" oninput="doc.sections[${i}].instruction=this.value;touch()">${esc(s.instruction)}</textarea></div><div class="field full"><label>Content</label><textarea class="contentField" placeholder="Enter the section body text here..." oninput="doc.sections[${i}].content=this.value;touch()">${esc(s.content)}</textarea></div><div class="field"><label>Section References</label><textarea class="short" placeholder="REF-001, REF-002, URL, internal document" oninput="doc.sections[${i}].references=this.value.split(',').map(x=>x.trim()).filter(Boolean);touch()">${esc((s.references||[]).join(', '))}</textarea></div><div class="field full"><label>Section Notes</label><textarea class="short" placeholder="One note per line" oninput="doc.sections[${i}].notes=this.value.split('\n').map(x=>x.trim()).filter(Boolean);touch()">${esc((s.notes||[]).join('\n'))}</textarea></div></div></div>`}
function table(key,fields,labels){const rows=doc[key]||[];return `<table><thead><tr>${labels.map(l=>`<th>${esc(l)}</th>`).join('')}<th>Actions</th></tr></thead><tbody>${rows.map((r,i)=>`<tr>${fields.map(f=>`<td><textarea class="short" oninput="doc['${key}'][${i}]['${f}']=this.value;touch()">${esc(r[f]||'')}</textarea></td>`).join('')}<td class="rowActions"><button onclick="doc['${key}'].splice(${i},1);touch();render()">Delete</button></td></tr>`).join('')}</tbody></table><button class="secondary" onclick="addRow('${key}',${JSON.stringify(fields).replace(/"/g,'&quot;')})">Add Row</button>`}
function addRow(key,fields){const o={};fields.forEach(f=>o[f]='');if(key==='references')o.id='REF-'+String(doc.references.length+1).padStart(3,'0');if(key==='notes')o.id='NOTE-'+String(doc.notes.length+1).padStart(3,'0');if(key==='controls')o.id='NIST-'+String(doc.controls.length+1).padStart(3,'0');if(key==='exceptions')o.id='EX-'+String(doc.exceptions.length+1).padStart(3,'0');doc[key].push(o);touch();render()} function changeType(t){const has=doc.sections.some(s=>s.content.trim());if(has&&!confirm('Replace current sections with the '+t+' template? Cancel keeps content and only changes the type label.')){doc.type=t;touch();render();return}doc.type=t;doc.title='New '+t+' Document';doc.sections=typeDefs[t].sections.map(makeSection);touch();render()} function addSection(){doc.sections.push({id:uid(),title:'New Section',instruction:'Describe what authors should include here.',example:'Provide a practical NIST-aligned example.',content:'',notes:[],references:[]});touch();render()} function addTemplateSection(){const opts=typeDefs[doc.type].sections.map((s,i)=>`${i+1}. ${s[0]}`).join('\n');const pick=prompt('Enter template section number to add:\n'+opts);const idx=parseInt(pick,10)-1;if(idx>=0&&idx<typeDefs[doc.type].sections.length){doc.sections.push(makeSection(typeDefs[doc.type].sections[idx]));touch();render()}} function resetSections(){if(confirm('Reset sections to default '+doc.type+' template? This removes section content.')){doc.sections=typeDefs[doc.type].sections.map(makeSection);touch();render()}} function moveSection(i,d){const j=i+d;if(j<0||j>=doc.sections.length)return;[doc.sections[i],doc.sections[j]]=[doc.sections[j],doc.sections[i]];touch();render()} function dupSection(i){const s=JSON.parse(JSON.stringify(doc.sections[i]));s.id=uid();s.title=s.title+' Copy';doc.sections.splice(i+1,0,s);touch();render()} function deleteSection(i){if(confirm('Delete this section?')){doc.sections.splice(i,1);touch();render()}}
function keywordIndex(){const text=[doc.title,doc.summary,doc.purpose,doc.scope,doc.nist.outcomes,doc.nist.riskStatement,...doc.sections.map(s=>s.title+' '+s.content)].join(' ').toLowerCase();const stop=new Set('the and for with from this that will shall must should are not you your have has into under over policy procedure standard best practice document section organization systems data users information security nist control controls requirement requirements content'.split(' '));const words=text.match(/[a-z][a-z0-9-]{3,}/g)||[];const c={};words.forEach(w=>{if(!stop.has(w))c[w]=(c[w]||0)+1});return Object.entries(c).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).slice(0,60).map(x=>x[0])} function quality(){const q=[];const add=(ok,warn,text)=>q.push({state:ok?'pass':warn?'warn':'fail',text});add(!!doc.title,false,'Title is populated.');add(!!doc.owner,false,'Owner is identified.');add(!!doc.scope,false,'Scope is defined.');add(doc.sections.length>0,false,'Document has sections.');add(doc.sections.every(s=>typeof s.content==='string'),false,'Every section has an editable content field.');add(doc.sections.some(s=>s.content.trim()),false,'At least one section content field has content.');add(doc.sections.every(s=>s.content.trim()),true,'Every section has content entered.');add(doc.nist.functions.length>0,false,'NIST CSF Function selected.');add(doc.nist.families.length>0,true,'NIST SP 800-53 family selected.');add(doc.references.length>0,true,'References are included.');add(doc.revisions.length>0,false,'Revision history exists.');return q} function rowHtml(rows,fields){return rows.map(r=>`<tr>${fields.map(f=>`<td>${nl2br(r[f]||'')}</td>`).join('')}</tr>`).join('')} function renderPreview(){document.getElementById('preview').innerHTML=toHtml()}
function toHtml(){const toc=doc.sections.map((s,i)=>`<li><a href="#sec-${i}">${esc(s.title)}</a></li>`).join('');const secs=doc.sections.map((s,i)=>`<h2 id="sec-${i}">${i+1}. ${esc(s.title)}</h2>${s.content.trim()?`<p>${nl2br(s.content)}</p>`:'<p class="empty">No content entered for this section yet.</p>'}${(s.references||[]).length?`<p class="hint"><strong>Section references:</strong> ${esc(s.references.join(', '))}</p>`:''}${(s.notes||[]).map(n=>`<div class="note"><strong>Note:</strong> ${esc(n)}</div>`).join('')}`).join('');return `<h1>${esc(doc.title)}</h1>${doc.status==='Draft'?'<span class="draft">DRAFT</span>':''}<p><span class="pill primary">${esc(doc.type)}</span><span class="pill">${esc(doc.nist.profile)}</span><span class="pill">Version ${esc(doc.version)}</span><span class="pill">${esc(doc.status)}</span><span class="pill">${esc(doc.classification)}</span></p><table><tbody><tr><th>Owner</th><td>${esc(doc.owner)}</td><th>Approver</th><td>${esc(doc.approver)}</td></tr><tr><th>Department</th><td>${esc(doc.department)}</td><th>Steward</th><td>${esc(doc.steward)}</td></tr><tr><th>Effective Date</th><td>${esc(doc.effectiveDate)}</td><th>Next Review</th><td>${esc(doc.nextReviewDate)}</td></tr></tbody></table><h2>Executive Summary</h2><p>${nl2br(doc.summary)}</p><h2>NIST Alignment</h2><table><tbody><tr><th>CSF Functions</th><td>${esc(doc.nist.functions.join(', '))}</td></tr><tr><th>SP 800-53 Families</th><td>${esc(doc.nist.families.join(', '))}</td></tr><tr><th>RMF Step / Context</th><td>${esc(doc.nist.rmfStep)}</td></tr><tr><th>Assessment Method</th><td>${esc(doc.nist.assessmentMethod)}</td></tr><tr><th>Outcomes / Control Objective</th><td>${nl2br(doc.nist.outcomes)}</td></tr><tr><th>Risk Statement</th><td>${nl2br(doc.nist.riskStatement)}</td></tr><tr><th>Evidence Strategy</th><td>${nl2br(doc.nist.evidenceStrategy)}</td></tr></tbody></table><h2>Table of Contents</h2><ol>${toc}</ol><h2>Purpose</h2><p>${nl2br(doc.purpose)}</p><h2>Background / Rationale</h2><p>${nl2br(doc.background)}</p><h2>Scope</h2><p>${nl2br(doc.scope)}</p><h2>Audience</h2><p>${nl2br(doc.audience)}</p><h2>Out of Scope</h2><p>${nl2br(doc.outOfScope)}</p><h2>Assumptions / Dependencies</h2><p>${nl2br(doc.assumptions)}</p><h2>Definitions</h2><table><thead><tr><th>Term</th><th>Definition</th></tr></thead><tbody>${rowHtml(doc.definitions,['term','definition'])}</tbody></table>${secs}<h2>NIST Control Mapping</h2><table><thead><tr><th>ID</th><th>CSF Outcome</th><th>SP 800-53 Control / Family</th><th>Requirement</th><th>Evidence</th><th>Frequency</th><th>Owner</th></tr></thead><tbody>${rowHtml(doc.controls,['id','csf','control','requirement','evidence','frequency','owner'])}</tbody></table><h2>Exceptions / Risk Acceptance</h2><table><thead><tr><th>ID</th><th>Description</th><th>Risk</th><th>Compensating Control</th><th>Owner</th><th>Expiration</th></tr></thead><tbody>${rowHtml(doc.exceptions,['id','description','risk','compensatingControl','owner','expiration'])}</tbody></table><h2>Revision History</h2><table><thead><tr><th>Version</th><th>Date</th><th>Author</th><th>Summary</th><th>Approver</th><th>Status</th></tr></thead><tbody>${rowHtml(doc.revisions,['version','date','author','summary','approver','status'])}</tbody></table><h2>References</h2><ol>${doc.references.map(r=>`<li><strong>${esc(r.id)}:</strong> ${esc(r.title)} — ${esc(r.source)}<br><span class="hint">${esc(r.note)}</span></li>`).join('')}</ol><h2>Notes</h2><ol>${doc.notes.map(n=>`<li><strong>${esc(n.id)} (${esc(n.section)}):</strong> ${esc(n.text)}</li>`).join('')}</ol><h2>Generated Keyword Index</h2><p>${keywordIndex().map(k=>`<span class="pill">${esc(k)}</span>`).join(' ')}</p>${doc.reviewNotes?`<h2>Review / Publication Notes</h2><p>${nl2br(doc.reviewNotes)}</p>`:''}`}
function mdTable(headers,rows){return '| '+headers.join(' | ')+' |\n| '+headers.map(()=>'-').join(' | ')+' |\n'+rows.map(r=>'| '+r.map(x=>String(x||'').replace(/\|/g,'\\|').replace(/\n/g,'<br>')).join(' | ')+' |').join('\n')} function toMarkdown(){let out=`# ${doc.title}\n\n**Document Type:** ${doc.type}  \n**NIST Profile:** ${doc.nist.profile}  \n**Version:** ${doc.version}  \n**Status:** ${doc.status}  \n**Classification:** ${doc.classification}  \n**Owner:** ${doc.owner}  \n**Approver:** ${doc.approver}  \n**Effective Date:** ${doc.effectiveDate}  \n**Next Review Date:** ${doc.nextReviewDate}\n\n## Executive Summary\n${doc.summary}\n\n## NIST Alignment\n- CSF Functions: ${doc.nist.functions.join(', ')}\n- SP 800-53 Families: ${doc.nist.families.join(', ')}\n- RMF Step / Context: ${doc.nist.rmfStep}\n- Assessment Method: ${doc.nist.assessmentMethod}\n\n### Outcomes / Control Objective\n${doc.nist.outcomes}\n\n### Risk Statement\n${doc.nist.riskStatement}\n\n### Evidence Strategy\n${doc.nist.evidenceStrategy}\n\n## Table of Contents\n${doc.sections.map((s,i)=>`${i+1}. ${s.title}`).join('\n')}\n\n## Purpose\n${doc.purpose}\n\n## Background / Rationale\n${doc.background}\n\n## Scope\n${doc.scope}\n\n## Audience\n${doc.audience}\n\n## Out of Scope\n${doc.outOfScope}\n\n## Assumptions / Dependencies\n${doc.assumptions}\n\n## Definitions\n${mdTable(['Term','Definition'],doc.definitions.map(d=>[d.term,d.definition]))}\n\n`;doc.sections.forEach((s,i)=>{out+=`## ${i+1}. ${s.title}\n\n${s.content}\n\n`;if(s.references?.length)out+=`**Section References:** ${s.references.join(', ')}\n\n`;if(s.notes?.length)out+=`**Notes**\n${s.notes.map(n=>`- ${n}`).join('\n')}\n\n`});out+=`## NIST Control Mapping\n${mdTable(['ID','CSF Outcome','SP 800-53 Control / Family','Requirement','Evidence','Frequency','Owner'],doc.controls.map(c=>[c.id,c.csf,c.control,c.requirement,c.evidence,c.frequency,c.owner]))}\n\n## Exceptions / Risk Acceptance\n${mdTable(['ID','Description','Risk','Compensating Control','Owner','Expiration'],doc.exceptions.map(e=>[e.id,e.description,e.risk,e.compensatingControl,e.owner,e.expiration]))}\n\n## Revision History\n${mdTable(['Version','Date','Author','Summary','Approver','Status'],doc.revisions.map(r=>[r.version,r.date,r.author,r.summary,r.approver,r.status]))}\n\n## References\n${doc.references.map(r=>`- **${r.id}:** ${r.title} — ${r.source}\n  - ${r.note}`).join('\n')}\n\n## Notes\n${doc.notes.map(n=>`- **${n.id} (${n.section}):** ${n.text}`).join('\n')}\n\n## Generated Keyword Index\n${keywordIndex().join(', ')}\n`;if(doc.reviewNotes)out+=`\n## Review / Publication Notes\n${doc.reviewNotes}\n`;return out} function exportMarkdown(){download(slug(doc.title)+'.md','text/markdown;charset=utf-8',toMarkdown())} function exportJson(){download(slug(doc.title)+'.json','application/json;charset=utf-8',JSON.stringify(doc,null,2))} function importJson(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result);if(!p.sections||!p.type)throw new Error('bad schema');doc=p;doc.id=doc.id||uid();doc.reviewNotes=doc.reviewNotes||'';touch();render();setStatus('Imported JSON project.')}catch(err){alert('Invalid or incompatible JSON.')}};r.readAsText(f);e.target.value=''} function saveLocal(){doc.modified=now();const all=JSON.parse(localStorage.getItem(STORE)||'{}');all[doc.id]=doc;localStorage.setItem(STORE,JSON.stringify(all));setStatus('Saved locally in this browser.');render()} function savedList(){const all=JSON.parse(localStorage.getItem(STORE)||'{}');const docs=Object.values(all).sort((a,b)=>String(b.modified).localeCompare(String(a.modified)));if(!docs.length)return '<p class="hint">No saved documents.</p>';return `<table><thead><tr><th>Title</th><th>Type</th><th>Version</th><th>Modified</th><th>Action</th></tr></thead><tbody>${docs.map(d=>`<tr><td>${esc(d.title)}</td><td>${esc(d.type)}</td><td>${esc(d.version)}</td><td>${esc(d.modified||'')}</td><td><button onclick="loadDoc('${esc(d.id)}')">Load</button></td></tr>`).join('')}</tbody></table>`} function loadDoc(id){const all=JSON.parse(localStorage.getItem(STORE)||'{}');if(all[id]){doc=all[id];doc.reviewNotes=doc.reviewNotes||'';render();setStatus('Loaded saved document.')}} function clearLocal(){if(confirm('Delete all locally saved documents?')){localStorage.removeItem(STORE);render();setStatus('Local data cleared.')}} function newDoc(){if(confirm('Start a new blank document?')){doc=newDocObj('Policy');active='sections';render()}} function snapshot(){doc.snapshots.push({date:now(),version:doc.version,summary:'Snapshot captured for version '+doc.version,json:JSON.stringify(doc),markdown:toMarkdown()});doc.revisions.push({version:doc.version,date:today(),author:doc.owner||'',summary:'Revision snapshot captured.',approver:doc.approver||'',status:doc.status});touch();saveLocal();render()} function snapshotsHtml(){if(!doc.snapshots.length)return '<p class="hint">No snapshots yet.</p>';return `<table><thead><tr><th>Date</th><th>Version</th><th>Summary</th></tr></thead><tbody>${doc.snapshots.map(s=>`<tr><td>${esc(s.date)}</td><td>${esc(s.version)}</td><td>${esc(s.summary)}</td></tr>`).join('')}</tbody></table>`} render();
</script></body></html>
