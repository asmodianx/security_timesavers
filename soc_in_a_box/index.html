<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC in a Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div id="desktop-clock">
            <div id="clock-local-time">00:00:00</div>
            <div id="clock-local-date">Loading...</div>
            <div id="clock-utc-wrap">
                <span class="utc-label">UTC:</span> 
                <span id="clock-utc-time">00:00:00</span>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-button">🚀 Start</button>
        <div id="active-apps-bar"></div>
    </div>

    <div id="start-menu" class="hidden">
        <div class="start-menu-header">SOC Terminal</div>
        <div id="app-list"></div>
        <div class="start-menu-footer">
            <button onclick="Desktop.showAddAppDialog()">➕ Add Custom Tool</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
